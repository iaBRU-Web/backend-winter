services:
  - type: web
    name: backend-winter
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Pick a plan in the Render dashboard when you create the service --
    # plan names/tiers change over time so it's left unset here.
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /api/v1/health
    autoDeploy: true

services:
  - type: web
    name: winter-ai-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "*"
        # After your Vercel frontend is deployed, replace "*" with its exact
        # URL (e.g. https://winter-ai.vercel.app) to lock CORS down.
    healthCheckPath: /api/v1/health
    autoDeploy: true
